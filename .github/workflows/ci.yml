name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ci-placeholder-key
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder
      VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      VITE_FIREBASE_APP_ID: 1:000000000000:web:ci000000000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
